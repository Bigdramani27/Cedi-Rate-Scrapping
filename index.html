<!DOCTYPE html>
<html>
<head>
  <title>USD → GHS Scraper</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
    }

    .spinner {
      display: none;
      margin: 20px auto;
      width: 50px;
      height: 50px;
      border: 6px solid #eee;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <h2>USD → GHS Scraper</h2>

  <button id="btn" onclick="startDownload()">Download Excel</button>

  <div class="spinner" id="loader"></div>

  <p id="status">Click the button to start.</p>

  <script>
    function startDownload() {
      const loader = document.getElementById('loader');
      const status = document.getElementById('status');
      const btn = document.getElementById('btn');

      loader.style.display = 'block';
      status.textContent = 'Scraping data... please wait';
      btn.disabled = true;
      btn.textContent = "Processing...";

      fetch('/scrape')
        .then(res => res.blob())
        .then(blob => {
          const url = window.URL.createObjectURL(blob);

          const a = document.createElement('a');
          a.href = url;

          const today = new Date().toISOString().split("T")[0];
          a.download = `rates_${today}.xlsx`;

          document.body.appendChild(a);
          a.click();
          a.remove();

          loader.style.display = 'none';
          status.textContent = 'Download complete ✅';
          btn.disabled = false;
          btn.textContent = "Download Excel";
        })
        .catch(err => {
          console.error(err);
          loader.style.display = 'none';
          status.textContent = 'Error occurred';
          btn.disabled = false;
          btn.textContent = "Download Excel";
        });
    }
  </script>

</body>
</html>
